version: '3.8'

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp
      MYSQL_PASSWORD: wp
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  wordpress:
    image: wordpress:6.4
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wp
      WORDPRESS_DB_PASSWORD: wp
      WORDPRESS_DEBUG: 1
    volumes:
      - ./wp/themes/bys-store:/var/www/html/wp-content/themes/bys-store
      - wp_data:/var/www/html

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=wordpress
      - DB_USER=wp
      - DB_PASSWORD=wp
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./api:/app

  react-admin:
    build: ./react-admin
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./react-admin/src:/app/src

volumes:
  db_data:
  wp_data:
